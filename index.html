<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flight Quote Selector</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="quote-panel" aria-label="Flight quote documents">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Flight desk</p>
            <h1>Quote Review</h1>
          </div>
          <span class="status-pill" id="quoteCount">0 PDFs</span>
        </div>

        <label class="upload-zone" for="pdfInput">
          <input id="pdfInput" type="file" accept="application/pdf" multiple />
          <span class="upload-icon" aria-hidden="true">+</span>
          <span>
            <strong>Add quote PDFs</strong>
            <small>Upload flight quote files to review and select.</small>
          </span>
        </label>

        <section class="quote-form" aria-label="Quote details">
          <label>
            Quote name
            <input id="quoteName" type="text" placeholder="Example: LAX to JFK - Option A" />
          </label>
          <div class="form-grid">
            <label>
              Airline
              <input id="airlineName" type="text" placeholder="Delta" />
            </label>
            <label>
              Price
              <input id="quotePrice" type="text" placeholder="$428" />
            </label>
          </div>
          <button class="secondary-button" id="saveDetails" type="button">Save details</button>
        </section>

        <div class="list-header">
          <h2>Available quotes</h2>
          <button class="text-button" id="clearQuotes" type="button">Clear</button>
        </div>
        <div class="quote-list" id="quoteList" role="list"></div>
      </aside>

      <section class="viewer-panel">
        <header class="viewer-header">
          <div>
            <p class="eyebrow">Selected file</p>
            <h2 id="activeTitle">No quote loaded</h2>
            <p id="activeMeta">Upload a PDF to begin reviewing flight options.</p>
          </div>
          <button class="primary-button" id="selectQuote" type="button" disabled>Select this quote</button>
        </header>

        <div class="selection-banner" id="selectionBanner" hidden>
          <span>Chosen quote</span>
          <strong id="chosenQuoteName"></strong>
        </div>

        <div class="pdf-frame" id="pdfFrame">
          <div class="empty-state">
            <div class="empty-icon" aria-hidden="true">PDF</div>
            <h3>Flight quote reader</h3>
            <p>Add one or more quote PDFs, open each one here, then select the best option for the traveler.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
